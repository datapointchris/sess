version: 2

builds:
  - main: ./cmd/sess
    binary: sess
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.buildVersion={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "sess_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

changelog:
  sort: asc
